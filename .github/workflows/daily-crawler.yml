name: Daily crawler

on:
  schedule:
    - cron: "30 7 * * 1-5"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      # Holdings-only: MoneyDJ exposes just the latest snapshot, so the daily
      # job exists to accumulate it. Quotes are skipped (backfillable by date).
      - run: python -c "from app.api import AppApi; AppApi(__import__('pathlib').Path('data/market.sqlite')).sync_holdings_snapshot()"
      - uses: actions/upload-artifact@v4
        with:
          name: market-sqlite
          path: data/market.sqlite
