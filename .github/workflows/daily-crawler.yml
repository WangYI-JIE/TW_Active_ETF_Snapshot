name: Daily crawler

on:
  schedule:
    # 06:00 Taiwan (UTC+8) = 22:00 UTC, every day. This is ~1-2h after the US
    # market close (16:00 ET), so the just-closed US session's prices are
    # available via yfinance; it also captures the prior TW close. Runs daily —
    # non-trading days yield no new data, so nothing is committed (implicit
    # holiday handling). GitHub cron can drift 15-30 min, which is fine here.
    - cron: "0 22 * * *"
  workflow_dispatch:

# Needed so the job can commit the accumulated JSON snapshots back to the repo.
permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests beautifulsoup4 yfinance
      # Fetch the TWSE active-ETF universe (date-stamped JSON) and crawl MoneyDJ
      # holdings ETF-by-ETF into snapshots/snapshot-YYYY-MM-DD.json + latest.json.
      # MoneyDJ only exposes the latest snapshot, so daily capture is what builds
      # the history; previous snapshots are read back for diffing/clearance.
      - run: python crawlers/fund_holdings.py
      - name: Commit snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add snapshots latest.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No new snapshot (likely a non-trading day) — nothing to commit."
          else
            git commit -m "snapshot $(date -u +%F)"
            git push
          fi
